name: CI Pipeline (Build + Tests)
on:
  workflow_call:
env:
  PYTHON_VERSION: "3.12"
jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Project (Django check)
        run: |
          python manage.py check
          python manage.py migrate --noinput

  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Run Unit Tests
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html || true
          pytest -m "unit" --disable-warnings --maxfail=1


      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
           files: ./coverage.xml
           flags: unittests
           name: codecov-umbrella
           fail_ci_if_error: false
    
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
           name: coverage-report
           path: htmlcov/  

  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit_tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://testuser:testpass@localhost:5432/testdb

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django psycopg2-binary

      - name: Run Migrations
        run: |
          python manage.py migrate --noinput

      - name: Run Integration Tests
        run: |
          pytest -m "integration" --disable-warnings --maxfail=1

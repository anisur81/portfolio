name: Enterprise CI/CD Pipeline

# Add required permissions to your workflow
permissions:
  contents: read
  actions: read
  security-events: write
  
on:
  push:
   branches: [ main, develop ]

  pull_request:
    branches: [ main, develop ]
env:
  PYTHON_VERSION: '3.12.3'
  DJANGO_SETTINGS_MODULE: portfolio.settings
  
jobs:

  secret-scan:
    uses: ./.github/workflows/01-secret-scan.yml

  code-formating:
    needs: secret-scan
    uses: ./.github/workflows/02-code-formatting.yml

  linting:
    needs: secret-scan
    uses: ./.github/workflows/03-code-linting.yml

  SCA:
    needs: secret-scan 
    uses: ./.github/workflows/04-SCA-dependency-scan.yml

  SAST:
    needs: SCA
    uses: ./.github/workflows/05-SAST-security.yml

  
 

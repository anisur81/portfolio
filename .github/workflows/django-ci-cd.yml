name: Django CI/CD Pipeline

# Add required permissions to your workflow
permissions:
  contents: read
  security-events: write
  
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
env:
  PYTHON_VERSION: '3.12.3'
  DJANGO_SETTINGS_MODULE: portfolio.settings
  # PYTHON_FILES: tests.py test_*.py *_tests.py

jobs:

# 0. Secrets Scan (Gitleaks and Trufflehog)
# =========================
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

       # Gitleaks Scanning
      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_EXIT_CODE: 1

       # Add SARIF upload to GitHub Security tab
      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: github.ref == 'refs/heads/main'
        with:
          sarif_file: results.sarif
    
        # TRUFFLEHOG Scanning
        
      - name: Run TruffleHog Scan
        uses: trufflesecurity/trufflehog@v3.82.8
        with:
           path: ./
           base: ${{ github.event.before }}
           head: ${{ github.sha }}  

  # Job 1: Code Quality and Linting
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort pylint
    
    - name: Install gunicorn dependencies
      run: pip install gunicorn     

    - name: Run Black (Code Formatting)
      run: black .
    
    - name: Run isort (Import Sorting)
      run: isort .
    
    - name: Run Flake8 (Linting)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Run Pylint
      run: pylint **/*.py --exit-zero
  
# Job 2: Security Checks
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install safety bandit
    
    - name: Check for security vulnerabilities
      run: safety check --json
    
    - name: Run Bandit security scan
      run: bandit -r . -ll -f json -o bandit-report.json

# Job 3: Run Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest django pytest-django pytest-cov
    
    - name: Run Tests with Coverage
      run: |
        pytest --cov=. --cov-report=xml --cov-report=html || true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/      



# Job 4: Build Docker Image and Push to GitHub Container Registry
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]

    permissions:
      contents: read
      packages: write

    # Push only on main branch
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}        
 
   
